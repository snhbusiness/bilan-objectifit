<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Objectif'it — Bilan de ta séance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070A16;--card:rgba(255,255,255,.05);--card2:rgba(255,255,255,.09);--lime:#C4F03A;--cyan:#22D3EE;--ink:#F4F5FA;--muted:#8B8F9E;--line:rgba(255,255,255,.1);--warn:#FF9F5C;--grad:linear-gradient(120deg,#C4F03A,#22D3EE)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Space Grotesk',system-ui,sans-serif}
.exp{font-family:'Clash Display','Space Grotesk',sans-serif}.mono{font-family:'Space Mono',monospace}
body{background:radial-gradient(130% 80% at 50% -10%,#131a33 0%,var(--bg) 55%) fixed;color:var(--ink);overflow-x:hidden}
.grain{position:fixed;inset:0;opacity:.09;mix-blend-mode:overlay;pointer-events:none;z-index:1;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>")}
.progress{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.08);z-index:5}.progress i{display:block;height:100%;width:0;background:var(--grad);transition:width .4s}
.wrap{max-width:460px;margin:0 auto;position:relative;z-index:2}
.photo{position:relative;height:300px;overflow:hidden;border-radius:0 0 28px 28px}
.photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:grayscale(1) contrast(1.05)}
.photo .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,77,141,.28) 0%,rgba(7,10,22,.35) 45%,var(--bg) 99%)}
.photo .lg{position:absolute;top:20px;left:22px}.photo .lg img{position:static;height:42px;width:auto}
.photo .c{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:24px 22px}
.eyebrow{font-family:'Space Mono';font-size:11px;letter-spacing:1.5px;color:var(--lime);text-transform:uppercase}
h1{font-size:34px;line-height:.9;letter-spacing:-1.3px;margin-top:10px;font-weight:900;text-transform:uppercase;text-shadow:0 4px 20px rgba(0,0,0,.5)}h1 .hl{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.stage{padding:30px 22px}
.lead{font-size:15px;line-height:1.55;color:#c3cbf0;margin:20px 0;font-weight:500}.lead b{color:var(--ink)}
.qnum{font-family:'Space Mono';font-size:12px;color:var(--muted)}
.q{font-size:22px;line-height:1.14;letter-spacing:-.5px;margin-top:8px;font-weight:900}
.qsub{font-size:13px;line-height:1.45;color:var(--muted);margin-top:10px;padding-left:12px;border-left:2px solid rgba(196,240,58,.4)}
.opts{margin-top:20px;display:flex;flex-direction:column;gap:11px}
.opt{background:var(--card);border:1.5px solid var(--line);border-radius:18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:16px 18px;font-size:15px;font-weight:600;text-align:left;cursor:pointer;transition:.15s;color:var(--ink)}
.opt:active{transform:scale(.98)}.opt:hover{border-color:var(--lime)}
.btn{width:100%;height:58px;border:none;border-radius:20px;background:var(--grad);color:#07110B;font-family:'Space Grotesk';font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 34px -8px rgba(196,240,58,.6);animation:pulseGlow 3s ease-in-out infinite}@keyframes pulseGlow{0%,100%{box-shadow:0 10px 30px -6px rgba(196,240,58,.5)}50%{box-shadow:0 10px 44px 2px rgba(196,240,58,.85)}}
.tin{width:100%;height:56px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);color:var(--ink);font-size:17px;font-weight:600;padding:0 18px;margin-top:22px;outline:none}.tin:focus{border-color:var(--lime)}.tin::placeholder{color:var(--muted)}
.ring-spin{width:58px;height:58px;border-radius:50%;border:4px solid rgba(196,240,58,.18);border-top-color:var(--lime);animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.bignum{text-align:center;margin:18px 0 6px}
.bignum .n{font-family:'Clash Display','Space Grotesk',sans-serif;font-weight:700;font-size:60px;line-height:1;letter-spacing:-1px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.bignum .l{font-family:'Space Mono';font-size:12px;color:var(--muted);text-transform:uppercase;margin-top:6px;letter-spacing:1px}
.rep{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:14px}
.rep .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}.rep .row:last-child{border-bottom:0}
.rep .lbl{font-size:13.5px;font-weight:600;color:#e3e8ff;flex:1}.rep .lbl small{display:block;font-family:'Space Mono';font-size:10px;color:var(--muted);font-weight:400;margin-top:2px}
.tag-no{font-family:'Space Mono';font-size:10px;font-weight:700;color:var(--warn);background:rgba(245,165,36,.14);border:1px solid rgba(245,165,36,.35);border-radius:999px;padding:4px 9px;letter-spacing:.5px;white-space:nowrap}
.tag-ok{font-family:'Space Mono';font-size:10px;font-weight:700;color:var(--lime);background:rgba(196,240,58,.14);border:1px solid rgba(196,240,58,.35);border-radius:999px;padding:4px 9px;white-space:nowrap}
.punch{margin-top:16px;padding:18px;border-radius:20px;background:var(--card2);border:1px solid rgba(196,240,58,.3)}
.punch p{font-size:15.5px;line-height:1.5;font-weight:600}.punch .hl{color:var(--lime);font-weight:800}
.cap{margin-top:16px;background:var(--card2);border:1px solid rgba(196,240,58,.35);border-radius:22px;padding:20px}
.cap-scarcity{display:inline-block;font-family:'Space Mono';font-size:11px;color:var(--warn);background:rgba(245,165,36,.12);border:1px solid rgba(245,165,36,.3);border-radius:999px;padding:5px 11px;margin-bottom:14px}
.cap-h{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:14px}.cap-h b{color:var(--lime)}
.cap-in{width:100%;height:52px;border-radius:14px;background:var(--bg);border:1.5px solid var(--line);color:var(--ink);font-size:16px;font-weight:600;padding:0 16px;margin-bottom:10px;outline:none}.cap-in:focus{border-color:var(--lime)}.cap-in::placeholder{color:var(--muted)}
.cap-note{font-family:'Space Mono';font-size:11px;color:var(--muted);text-align:center;margin-top:12px}
.fade{animation:fade .35s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style></head>

function showQ(){
 var it=Q[step];bar.style.width=(step/Q.length*100)+"%";stage.className="stage";stage.style.padding="30px 22px";
 if(it.type==="text"){
  render('<div class="qnum">Question 1/'+Q.length+'</div><div class="q exp">'+it.q+'</div>'+
   '<input class="tin" id="txt" placeholder="'+it.ph+'" autocomplete="given-name">'+
   '<button class="btn" style="margin-top:14px" onclick="answerText()">Continuer →</button>');
  setTimeout(function(){var t=document.getElementById("txt");if(t){t.focus();t.onkeydown=function(e){if(e.key==="Enter")answerText();};}},60);return;
 }
 var o=it.opts.map(function(x,idx){return '<button class="opt" onclick="answer('+idx+')">'+x[0]+'</button>';}).join("");
 render('<div class="qnum">Question '+(step+1)+'/'+Q.length+' · '+it.label+'</div><div class="q exp">'+it.q+'</div>'+
   (it.sub?'<div class="qsub">'+it.sub+'</div>':'')+'<div class="opts">'+o+'</div>');
}
function answerText(){var v=(document.getElementById("txt")||{}).value;v=(v||"").trim();if(!v)return;ans[Q[step].key]=v;next();}
function answer(idx){ans[Q[step].key]=Q[step].opts[idx][1];next();}
function next(){step++;step<Q.length?showQ():reveal();}

function reveal(){
 bar.style.width="100%";stage.className="";stage.style.padding="0";
 var nm=esc(ans["name"]||"");
 render('<div style="min-height:82vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;text-align:center">'+
  '<div class="ring-spin"></div><div class="exp" style="font-size:22px;margin-top:26px;letter-spacing:-.5px">On évalue ta séance'+(nm?", "+nm:"")+'…</div>'+
  '<div id="rstep" class="mono" style="font-size:12px;color:var(--muted);margin-top:12px;min-height:18px"></div></div>');
 var steps=["Analyse de ton intensité (RIR)…","Contrôle tempo & surcharge…","Vérif composition & récup…","Calcul du potentiel activé…"];
 var el=document.getElementById("rstep"),i=0;if(el)el.textContent=steps[0];
 var iv=setInterval(function(){i++;if(el&&i<steps.length)el.textContent=steps[i];},520);
 setTimeout(function(){clearInterval(iv);showResult();},2300);
}

function showResult(){
 bar.style.width="100%";
 var name=ans["name"]||"toi";
 var datas=Q.filter(function(q){return q.key!=="name";});
 var known=0;
 var rows=datas.map(function(q){
   var ok=ans[q.key]===1; if(ok)known++;
   return '<div class="row"><div class="lbl">'+q.label+'<small>'+q.term+'</small></div>'+
     (ok?'<span class="tag-ok">✓ piloté</span>':'<span class="tag-no">✕ à l\'aveugle</span>')+'</div>';
 }).join("");
 var total=datas.length; var score=Math.round(known/total*100); var perte=100-score;
 var col = score<40?"var(--warn)":score<70?"var(--warn)":"var(--lime)";
 var title = score<40 ? "TU PILOTES TA SÉANCE À L'AVEUGLE" : score<70 ? "TA SÉANCE EST À MOITIÉ PILOTÉE" : "TU MAÎTRISES DÉJÀ BEAUCOUP";

 render('<div class="stage">'+
  '<div class="eyebrow">▸ Le bilan de ta séance</div>'+
  '<h1 class="exp" style="font-size:28px;margin-top:8px">'+esc(name).toUpperCase()+',<br>'+title+'</h1>'+
  '<div class="bignum"><div class="n exp" style="color:'+col+'">'+score+'%</div><div class="l">du potentiel de ta séance activé</div></div>'+
  '<div class="rep">'+rows+'</div>'+
  '<div class="punch"><p>Ces 6 leviers — intensité, tempo, surcharge, repos, composition, récup — c\'est <b>exactement</b> ce qu\'un coach pilote pour toi. Aujourd\'hui, tu laisses <span class="hl">~'+perte+'% de tes résultats sur la table.</span> Le bilan de Sébastien te montre lesquels tu rates, et comment les corriger. Offert.</p></div>'+
  '<div class="cap">'+
   '<div class="cap-scarcity">⚡ Places limitées · quelques bilans offerts / semaine</div>'+
   '<div class="cap-h">🎁 '+esc(name)+', récupère les '+perte+'% que tu laisses filer — bilan offert avec Sébastien</div>'+
   '<input class="cap-in" id="lead-phone" type="tel" inputmode="tel" placeholder="Ton téléphone" autocomplete="tel">'+
   '<button class="btn" id="lead-go" style="margin-top:6px">Je veux mon bilan offert →</button>'+
   '<p class="cap-note">100% offert · sans engagement · réponse sous 24 h.</p>'+
  '</div></div>');
 var go=document.getElementById("lead-go");
 if(go) go.onclick=function(){submitLead(name,score);};
}

function submitLead(name,score){
 var phone=(document.getElementById("lead-phone")||{}).value;phone=(phone||"").trim();
 if(!phone){alert("Ton téléphone, s'il te plaît \uD83D\uDE42");return;}
 var btn=document.getElementById("lead-go");if(btn){btn.textContent="Envoi…";btn.disabled=true;}
 fetch(LEAD_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({firstName:name,phone:phone,profile:"Séance "+score+"% pilotée",objective:"optimiser sa séance",score:score,weakPoint:"pilotage séance"})})
  .catch(function(){})
  .then(function(){
   var msg="Bonjour Sébastien, je suis "+name+". J'ai fait le test des vestiaires ("+score+"% de ma séance pilotée) — je veux mon bilan offert !";
   window.location.href="https://wa.me/"+WHATSAPP_NUM+"?text="+encodeURIComponent(msg);
  });
}
intro();
</script></body></html>
